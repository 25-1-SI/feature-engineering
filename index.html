<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서울 지하철 역 데이터 시각화</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .header h1 {
            text-align: center;
            color: #2c3e50;
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
        }
        
        .header p {
            text-align: center;
            color: #7f8c8d;
            font-size: 1.1rem;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto auto;
            gap: 2rem;
            margin-bottom: 2rem;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 1.5rem;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(31, 38, 135, 0.5);
        }
        
        .card h2 {
            color: #2c3e50;
            margin-bottom: 1rem;
            font-size: 1.5rem;
            font-weight: 500;
            text-align: center;
        }
        
        .map-container {
            grid-column: 1 / -1;
            height: 600px;
        }
        
        #map {
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }
        
        .chart-container {
            height: 400px;
            position: relative;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .stat-item {
            text-align: center;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            display: block;
        }
        
        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 0.5rem;
        }
        
        .controls {
            margin-bottom: 2rem;
            text-align: center;
        }
        
        .filter-group {
            display: inline-block;
            margin: 0 1rem;
        }
        
        select, input {
            padding: 0.5rem 1rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            background: white;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: white;
        }
        
        .legend {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }
        
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 10px;
        }
        
        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            .container {
                padding: 1rem;
            }
            
            .header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚇 서울 지하철 역 종합 분석 대시보드</h1>
        <p>지하철 역별 위험도, 깊이, 공사 현황 및 지반 정보 시각화</p>
    </div>
    
    <div class="container">
        <div class="controls">
            <div class="filter-group">
                <label for="lineFilter">호선 필터:</label>
                <select id="lineFilter">
                    <option value="">전체</option>
                    <option value="1">1호선</option>
                    <option value="2">2호선</option>
                    <option value="3">3호선</option>
                    <option value="4">4호선</option>
                    <option value="5">5호선</option>
                    <option value="6">6호선</option>
                    <option value="7">7호선</option>
                    <option value="8">8호선</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label for="riskFilter">위험도 필터:</label>
                <select id="riskFilter">
                    <option value="">전체</option>
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label for="depthFilter">깊이 필터 (m):</label>
                <input type="range" id="depthFilter" min="0" max="40" value="40" step="1">
                <span id="depthValue">40m</span>
            </div>
        </div>
        
        <div class="dashboard">
            <div class="card map-container">
                <h2>🗺️ 지하철 역 위치 및 위험도 지도</h2>
                <div id="map"></div>
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-color" style="background-color: #e74c3c;"></div>
                        <span>High Risk</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background-color: #f39c12;"></div>
                        <span>Medium Risk</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background-color: #27ae60;"></div>
                        <span>Low Risk</span>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <h2>📊 위험도 분포</h2>
                <div class="chart-container">
                    <canvas id="riskChart"></canvas>
                </div>
            </div>
            
            <div class="card">
                <h2>📏 역 깊이 분포</h2>
                <div class="chart-container">
                    <canvas id="depthChart"></canvas>
                </div>
            </div>
            
            <div class="card">
                <h2>🚇 호선별 통계</h2>
                <div class="chart-container">
                    <canvas id="lineChart"></canvas>
                </div>
            </div>
            
            <div class="card">
                <h2>🏗️ 공사 현황 분석</h2>
                <div class="chart-container">
                    <canvas id="constructionChart"></canvas>
                </div>
            </div>
            
            <div class="card">
                <h2>📈 주요 통계</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-value" id="totalStations">-</span>
                        <div class="stat-label">총 역 수</div>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="avgDepth">-</span>
                        <div class="stat-label">평균 깊이 (m)</div>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="highRiskCount">-</span>
                        <div class="stat-label">고위험 역</div>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="transferStations">-</span>
                        <div class="stat-label">환승역</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

        async function loadData() {
            try {
                // 임베딩된 데이터 사용
                subwayData = embeddedData.map(row => {
                    // 모든 값을 문자열로 변환하여 기존 로직과 호환성 유지
                    const obj = {};
                    Object.keys(row).forEach(key => {
                        obj[key] = row[key] !== null ? String(row[key]) : '';
                    });
                    return obj;
                });
                
                filteredData = [...subwayData];
                initializeMap();
                createCharts();
                updateStats();
                setupFilters();
                
                console.log('데이터 로드 완료:', subwayData.length, '개 역');
                
            } catch (error) {
                console.error('데이터 로드 오류:', error);
                alert('데이터를 로드할 수 없습니다.');
            }
        }
        
        function initializeMap() {
            // 지도 초기화
            map = L.map('map').setView([37.5665, 126.9780], 11);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);
            
            markersLayer = L.layerGroup().addTo(map);
            updateMapMarkers();
        }
        
        function updateMapMarkers() {
            markersLayer.clearLayers();
            
            filteredData.forEach(station => {
                if (!station.위도 || !station.경도) return;
                
                const lat = parseFloat(station.위도);
                const lng = parseFloat(station.경도);
                
                if (isNaN(lat) || isNaN(lng)) return;
                
                let color = '#27ae60'; // Low risk - green
                if (station.risk_level === 'Medium') color = '#f39c12'; // orange
                if (station.risk_level === 'High') color = '#e74c3c'; // red
                
                const marker = L.circleMarker([lat, lng], {
                    radius: 8,
                    fillColor: color,
                    color: '#fff',
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.8
                });
                
                const popupContent = `
                    <div style="text-align: center; min-width: 200px;">
                        <h3 style="margin: 0 0 10px 0; color: #2c3e50;">${station.station_name}</h3>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 12px;">
                            <div><strong>호선:</strong> ${station.호선}호선</div>
                            <div><strong>위험도:</strong> ${station.risk_level}</div>
                            <div><strong>깊이:</strong> ${parseFloat(station.station_depth || 0).toFixed(1)}m</div>
                            <div><strong>환승역:</strong> ${station.is_transfer_station === '1' ? '예' : '아니오'}</div>
                            <div style="grid-column: 1 / -1;"><strong>위험점수:</strong> ${parseFloat(station.comprehensive_risk_score || 0).toFixed(1)}</div>
                        </div>
                    </div>
                `;
                
                marker.bindPopup(popupContent);
                markersLayer.addLayer(marker);
            });
        }
        
        function createCharts() {
            createRiskChart();
            createDepthChart();
            createLineChart();
            createConstructionChart();
        }
        
        function createRiskChart() {
            const ctx = document.getElementById('riskChart').getContext('2d');
            const riskCounts = {
                'Low': filteredData.filter(s => s.risk_level === 'Low').length,
                'Medium': filteredData.filter(s => s.risk_level === 'Medium').length,
                'High': filteredData.filter(s => s.risk_level === 'High').length
            };
            
            if (charts.risk) {
                charts.risk.destroy();
            }
            
            charts.risk = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Low Risk', 'Medium Risk', 'High Risk'],
                    datasets: [{
                        data: [riskCounts.Low, riskCounts.Medium, riskCounts.High],
                        backgroundColor: ['#27ae60', '#f39c12', '#e74c3c'],
                        borderWidth: 2,
                        borderColor: '#fff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
        }
        
        function createDepthChart() {
            const ctx = document.getElementById('depthChart').getContext('2d');
            const depths = filteredData.map(s => parseFloat(s.station_depth || 0)).filter(d => !isNaN(d) && d > 0);
            
            // 깊이를 구간별로 나누기
            const depthRanges = {
                '0-10m': depths.filter(d => d >= 0 && d < 10).length,
                '10-20m': depths.filter(d => d >= 10 && d < 20).length,
                '20-30m': depths.filter(d => d >= 20 && d < 30).length,
                '30m+': depths.filter(d => d >= 30).length
            };
            
            if (charts.depth) {
                charts.depth.destroy();
            }
            
            charts.depth = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(depthRanges),
                    datasets: [{
                        label: '역 수',
                        data: Object.values(depthRanges),
                        backgroundColor: '#3498db',
                        borderColor: '#2980b9',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }
        
        function createLineChart() {
            const ctx = document.getElementById('lineChart').getContext('2d');
            const lineCounts = {};
            
            filteredData.forEach(station => {
                const line = station.호선 + '호선';
                lineCounts[line] = (lineCounts[line] || 0) + 1;
            });
            
            if (charts.line) {
                charts.line.destroy();
            }
            
            charts.line = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(lineCounts).sort(),
                    datasets: [{
                        label: '역 수',
                        data: Object.keys(lineCounts).sort().map(line => lineCounts[line]),
                        backgroundColor: [
                            '#e74c3c', '#3498db', '#f39c12', '#9b59b6',
                            '#1abc9c', '#34495e', '#e67e22', '#95a5a6'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }
        
        function createConstructionChart() {
            const ctx = document.getElementById('constructionChart').getContext('2d');
            const topStations = filteredData
                .filter(s => s.construction_count_500m && !isNaN(parseInt(s.construction_count_500m)))
                .sort((a, b) => parseInt(b.construction_count_500m) - parseInt(a.construction_count_500m))
                .slice(0, 10);
            
            const stationNames = topStations.map(s => s.station_name);
            const constructionCounts = topStations.map(s => parseInt(s.construction_count_500m) || 0);
            
            if (charts.construction) {
                charts.construction.destroy();
            }
            
            charts.construction = new Chart(ctx, {
                type: 'horizontalBar',
                data: {
                    labels: stationNames,
                    datasets: [{
                        label: '500m 내 공사 현장 수',
                        data: constructionCounts,
                        backgroundColor: '#e67e22',
                        borderColor: '#d35400',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }
        
        function updateStats() {
            const total = filteredData.length;
            const validDepths = filteredData
                .map(s => parseFloat(s.station_depth || 0))
                .filter(d => !isNaN(d) && d > 0);
            const avgDepth = validDepths.length > 0 ? validDepths.reduce((sum, d) => sum + d, 0) / validDepths.length : 0;
            const highRisk = filteredData.filter(s => s.risk_level === 'High').length;
            const transfer = filteredData.filter(s => s.is_transfer_station === '1').length;
            
            document.getElementById('totalStations').textContent = total;
            document.getElementById('avgDepth').textContent = avgDepth.toFixed(1);
            document.getElementById('highRiskCount').textContent = highRisk;
            document.getElementById('transferStations').textContent = transfer;
        }
        
        function setupFilters() {
            const lineFilter = document.getElementById('lineFilter');
            const riskFilter = document.getElementById('riskFilter');
            const depthFilter = document.getElementById('depthFilter');
            const depthValue = document.getElementById('depthValue');
            
            function applyFilters() {
                const selectedLine = lineFilter.value;
                const selectedRisk = riskFilter.value;
                const maxDepth = parseFloat(depthFilter.value);
                
                filteredData = subwayData.filter(station => {
                    // 호선 필터
                    if (selectedLine && station.호선 !== selectedLine) {
                        return false;
                    }
                    
                    // 위험도 필터
                    if (selectedRisk && station.risk_level !== selectedRisk) {
                        return false;
                    }
                    
                    // 깊이 필터
                    const stationDepth = parseFloat(station.station_depth || 0);
                    if (stationDepth > maxDepth) {
                        return false;
                    }
                    
                    return true;
                });
                
                // 모든 시각화 업데이트
                updateMapMarkers();
                createCharts();
                updateStats();
            }
            
            lineFilter.addEventListener('change', applyFilters);
            riskFilter.addEventListener('change', applyFilters);
            depthFilter.addEventListener('input', function() {
                depthValue.textContent = this.value + 'm';
                applyFilters();
            });
        }
        
        // 페이지 로드 시 데이터 로드
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
